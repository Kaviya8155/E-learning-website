<!DOCTYPE html>
<html>
<head>
    <title>Quiz</title>
    <style>

body {
    font-family: Arial;
    background: linear-gradient(135deg,#667eea,#764ba2);
}

/* hide all steps */
.step {
    display: none;
}

/* show step */
#q1:checked ~ .q1,
#q2:checked ~ .q2,
#q3:checked ~ .q3,
#q4:checked ~ .q4,
#q5:checked ~ .q5,
#submit:checked ~ .final {
    display: block;
}

/* box */
.box {
    background: white;
    width: 300px;
    margin: 80px auto;
    padding: 20px;
    border-radius: 10px;
    text-align: center;
}

/* options */
label {
    display: block;
    background: #eee;
    margin: 10px;
    padding: 10px;
    cursor: pointer;
    border-radius: 5px;
}

/* hide radio */
input[type="radio"] {
    display: none;
}

/* result */
.result {
    display: none;
}

/* correct */
#q1c:checked ~ .r1c,
#q2c:checked ~ .r2c,
#q3c:checked ~ .r3c,
#q4c:checked ~ .r4c,
#q5c:checked ~ .r5c {
    display: block;
    color: green;
}

/* wrong */
#q1w:checked ~ .r1w,
#q2w:checked ~ .r2w,
#q3w:checked ~ .r3w,
#q4w:checked ~ .r4w,
#q5w:checked ~ .r5w {
    display: block;
    color: red;
}

/* next button */
.next {
    display: inline-block;
    margin-top: 10px;
    padding: 8px 15px;
    background: orange;
    color: white;
    border-radius: 5px;
    text-decoration: none;
}

    </style>
</head>
<body>

<!-- control radios -->
<input type="radio" name="step" id="q1" checked>
<input type="radio" name="step" id="q2">
<input type="radio" name="step" id="q3">
<input type="radio" name="step" id="q4">
<input type="radio" name="step" id="q5">
<input type="radio" name="step" id="submit">

<!-- Q1 -->
<div class="step q1 box">
    <h3>1. HTML stands for?</h3>

    <input type="radio" id="q1c" name="a1">
    <label for="q1c">Hyper Text Markup Language</label>

    <input type="radio" id="q1w" name="a1">
    <label for="q1w">High Text Machine Language</label>

    <div class="result r1c">✅ Correct</div>
    <div class="result r1w">❌ Wrong</div>

    <label for="q2" class="next">Next ➡</label>
</div>

<!-- Q2 -->
<div class="step q2 box">
    <h3>2. CSS is used for?</h3>

    <input type="radio" id="q2c" name="a2">
    <label for="q2c">Styling</label>

    <input type="radio" id="q2w" name="a2">
    <label for="q2w">Programming</label>

    <div class="result r2c">✅ Correct</div>
    <div class="result r2w">❌ Wrong</div>

    <label for="q3" class="next">Next ➡</label>
</div>

<!-- Q3 -->
<div class="step q3 box">
    <h3>3. Which is a programming language?</h3>

    <input type="radio" id="q3c" name="a3">
    <label for="q3c">JavaScript</label>

    <input type="radio" id="q3w" name="a3">
    <label for="q3w">HTML</label>

    <div class="result r3c">✅ Correct</div>
    <div class="result r3w">❌ Wrong</div>

    <label for="q4" class="next">Next ➡</label>
</div>

<!-- Q4 -->
<div class="step q4 box">
    <h3>4. Which tag is used for heading?</h3>

    <input type="radio" id="q4c" name="a4">
    <label for="q4c">&lt;h1&gt;</label>

    <input type="radio" id="q4w" name="a4">
    <label for="q4w">&lt;p&gt;</label>

    <div class="result r4c">✅ Correct</div>
    <div class="result r4w">❌ Wrong</div>

    <label for="q5" class="next">Next ➡</label>
</div>

<!-- Q5 -->
<div class="step q5 box">
    <h3>5. Which tag links CSS?</h3>

    <input type="radio" id="q5c" name="a5">
    <label for="q5c">&lt;link&gt;</label>

    <input type="radio" id="q5w" name="a5">
    <label for="q5w">&lt;script&gt;</label>

    <div class="result r5c">✅ Correct</div>
    <div class="result r5w">❌ Wrong</div>

    <!-- SUBMIT BUTTON -->
    <label for="submit" class="next">Submit ✅</label>
</div>

<!-- FINAL PAGE -->
<div class="step final box">
    <h2>🎉 Congratulations!</h2>
    <p>You completed the quiz</p>
</div>

</body>
</html>
